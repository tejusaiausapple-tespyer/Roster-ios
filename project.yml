name: RosterStaff
options:
  bundleIdPrefix: com.sura.roster
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "GS2KGPX9P8"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    minVersion: "11.0.0"
    maxVersion: "13.0.0"

schemes:
  RosterStaff:
    build:
      targets:
        RosterStaff: all
        RosterStaffTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - RosterStaffTests
    archive:
      config: Release

targets:
  RosterStaff:
    type: application
    platform: iOS
    sources:
      - path: RosterStaff
    resources:
      - path: RosterStaff/Resources/GoogleService-Info.plist
        optional: true
      - path: RosterStaff/Resources/PrivacyInfo.xcprivacy
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseMessaging
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surainvestments.roster
        INFOPLIST_FILE: RosterStaff/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: RosterStaff/Resources/RosterStaff.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2" # Support both iPhone (1) and iPad (2)
        SUPPORTS_MACCATALYST: YES     # Enable Mac Catalyst (runs natively on macOS)
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    postCompileScripts:
      - name: Crashlytics Upload Symbols
        script: |
          if [ "${CONFIGURATION}" = "Release" ]; then
            "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          fi
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}
        basedOnDependencyAnalysis: false

  RosterStaffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RosterStaffTests
    dependencies:
      - target: RosterStaff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surainvestments.roster.tests
        GENERATE_INFOPLIST_FILE: YES
